<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Sukh Homes & Renovations Ltd.</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main style="padding-top: 60px;">
        <section class="section-padding">
            <div class="section-title-wrapper">
                <h1 class="section-title">Our Project Gallery</h1>
                <p style="font-size: 16px; color: var(--color-medium-gray);">A selection of our finest residential and commercial transformations.</p>
            </div>
            
            <div class="gallery-grid" style="margin-bottom: 60px;">
                <div class="gallery-item-wrap"><div class="gallery-item" style="background-image: url('images/kitchen.webp');"></div></div>
                <div class="gallery-item-wrap"><div class="gallery-item" style="background-image: url('images/img\ \(1\).jpg');"></div></div>
                <div class="gallery-item-wrap"><div class="gallery-item" style="background-image: url('images/img\ \(2\).jpg');"></div></div>
                <div class="gallery-item-wrap"><div class="gallery-item" style="background-image: url('images/img\ \(3\).jpg');"></div></div>
                <div class="gallery-item-wrap"><div class="gallery-item" style="background-image: url('images/img\ \(4\).jpg');"></div></div>
                <div class="gallery-item-wrap"><div class="gallery-item" style="background-image: url('images/img\ \(5\).jpg');"></div></div>
                <div class="gallery-item-wrap"><div class="gallery-item" style="background-image: url('images/img\ \(6\).jpg');"></div></div>
                <div class="gallery-item-wrap"><div class="gallery-item" style="background-image: url('images/img\ \(7\).jpg');"></div></div>
                <div class="gallery-item-wrap"><div class="gallery-item" style="background-image: url('images/img\ \(8\).jpg');"></div></div>
                <div class="gallery-item-wrap"><div class="gallery-item" style="background-image: url('images/img\ \(9\).jpg');"></div></div>
                <div class="gallery-item-wrap"><div class="gallery-item" style="background-image: url('images/img\ \(10\).jpg');"></div></div>
                <div class="gallery-item-wrap"><div class="gallery-item" style="background-image: url('images/img\ \(11\).jpg');"></div></div>
                <div class="gallery-item-wrap"><div class="gallery-item" style="background-image: url('images/img\ \(12\).jpg');"></div></div>
                <div class="gallery-item-wrap"><div class="gallery-item" style="background-image: url('images/img\ \(13\).jpg');"></div></div>
                <div class="gallery-item-wrap"><div class="gallery-item" style="background-image: url('images/img\ \(14\).jpg');"></div></div>
                <div class="gallery-item-wrap"><div class="gallery-item" style="background-image: url('images/img\ \(15\).jpg');"></div></div>
                <div class="gallery-item-wrap"><div class="gallery-item" style="background-image: url('images/img\ \(16\).jpg');"></div></div>
                <div class="gallery-item-wrap"><div class="gallery-item" style="background-image: url('images/img\ \(17\).jpg');"></div></div>
            </div>

            <div style="text-align: center; max-width: 600px; margin: 0 auto;">
                <h3 style="font-size: 24px; margin-bottom: 15px;">Ready to start your project?</h3>
                <a href="contact.html" class="btn">Get an Estimate</a>
            </div>
        </section>
    </main>

    <div id="footer-placeholder"></div>
    <script>
        fetch('header.html').then(r => r.text()).then(data => { document.getElementById('header-placeholder').innerHTML = data; const h = document.getElementById('hamburger-btn'); const m = document.getElementById('mobile-menu'); const c = document.getElementById('close-btn'); if(h) h.addEventListener('click', () => m.classList.add('open')); if(c) c.addEventListener('click', () => m.classList.remove('open')); });
        fetch('footer.html').then(r => r.text()).then(data => document.getElementById('footer-placeholder').innerHTML = data);
    </script>
</body>
</html>
